name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test:
    name: Test CLI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.1

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run CLI tests
        run: pnpm --filter @browsertrace/browsertrace test

  build-linux:
    name: Build Linux Binaries
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.1

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build pkg bundle
        working-directory: packages/browsertrace
        run: pnpm run build:release:bundle

      - name: Build Linux binaries
        working-directory: packages/browsertrace
        run: node ./scripts/build-release.mjs --platform linux --skip-checksums

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-linux
          path: |
            packages/browsertrace/releases/browsertrace-linux-x64
            packages/browsertrace/releases/browsertrace-linux-arm64

  build-macos:
    name: Build macOS Binaries
    runs-on: macos-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.1

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build pkg bundle
        working-directory: packages/browsertrace
        run: pnpm run build:release:bundle

      - name: Build macOS binaries
        working-directory: packages/browsertrace
        run: node ./scripts/build-release.mjs --platform darwin --skip-checksums

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-darwin
          path: |
            packages/browsertrace/releases/browsertrace-darwin-x64
            packages/browsertrace/releases/browsertrace-darwin-arm64

  build-windows:
    name: Build Windows Binaries
    runs-on: windows-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.1

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build pkg bundle
        working-directory: packages/browsertrace
        run: pnpm run build:release:bundle

      - name: Build Windows binaries
        working-directory: packages/browsertrace
        run: node ./scripts/build-release.mjs --platform windows --skip-checksums

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-windows
          path: |
            packages/browsertrace/releases/browsertrace-win-x64.exe
            packages/browsertrace/releases/browsertrace-win-arm64.exe

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build-linux
      - build-macos
      - build-windows
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          merge-multiple: true
          path: release-artifacts

      - name: Generate SHA256 sums
        working-directory: release-artifacts
        run: |
          sha256sum browsertrace-* > SHA256SUMS.txt

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release-artifacts/browsertrace-*
            release-artifacts/SHA256SUMS.txt
