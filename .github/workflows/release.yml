name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test:
    name: Test CLI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run CLI tests
        run: pnpm --filter @browsertrace/browsertrace test

  build-linux:
    name: Build Linux Binaries
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build pkg bundle
        run: pnpm --filter @browsertrace/browsertrace run build:release:bundle

      - name: Create release directory
        run: mkdir -p packages/browsertrace/releases

      - name: Build Linux x64 binary
        run: pnpm exec pkg packages/browsertrace/dist-pkg/pkg-main.cjs --targets node18-linux-x64 --output packages/browsertrace/releases/browsertrace-linux-x64 --public-packages '*'

      - name: Build Linux arm64 binary
        run: pnpm exec pkg packages/browsertrace/dist-pkg/pkg-main.cjs --targets node18-linux-arm64 --output packages/browsertrace/releases/browsertrace-linux-arm64 --public-packages '*'

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-linux
          path: |
            packages/browsertrace/releases/browsertrace-linux-x64
            packages/browsertrace/releases/browsertrace-linux-arm64

  build-macos:
    name: Build macOS Binaries
    runs-on: macos-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build pkg bundle
        run: pnpm --filter @browsertrace/browsertrace run build:release:bundle

      - name: Create release directory
        run: mkdir -p packages/browsertrace/releases

      - name: Build macOS x64 binary
        run: pnpm exec pkg packages/browsertrace/dist-pkg/pkg-main.cjs --targets node18-macos-x64 --output packages/browsertrace/releases/browsertrace-darwin-x64 --public-packages '*'

      - name: Build macOS arm64 binary
        run: pnpm exec pkg packages/browsertrace/dist-pkg/pkg-main.cjs --targets node18-macos-arm64 --output packages/browsertrace/releases/browsertrace-darwin-arm64 --public-packages '*'

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-darwin
          path: |
            packages/browsertrace/releases/browsertrace-darwin-x64
            packages/browsertrace/releases/browsertrace-darwin-arm64

  build-windows:
    name: Build Windows Binaries
    runs-on: windows-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build pkg bundle
        run: pnpm --filter @browsertrace/browsertrace run build:release:bundle

      - name: Create release directory
        shell: bash
        run: mkdir -p packages/browsertrace/releases

      - name: Build Windows x64 binary
        shell: bash
        run: pnpm exec pkg packages/browsertrace/dist-pkg/pkg-main.cjs --targets node18-win-x64 --output packages/browsertrace/releases/browsertrace-win-x64.exe --public-packages '*'

      - name: Build Windows arm64 binary
        shell: bash
        run: pnpm exec pkg packages/browsertrace/dist-pkg/pkg-main.cjs --targets node18-win-arm64 --output packages/browsertrace/releases/browsertrace-win-arm64.exe --public-packages '*'

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-windows
          path: |
            packages/browsertrace/releases/browsertrace-win-x64.exe
            packages/browsertrace/releases/browsertrace-win-arm64.exe

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build-linux
      - build-macos
      - build-windows
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          merge-multiple: true
          path: release-artifacts

      - name: Generate SHA256 sums
        working-directory: release-artifacts
        run: |
          sha256sum browsertrace-* > SHA256SUMS.txt

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release-artifacts/browsertrace-*
            release-artifacts/SHA256SUMS.txt
